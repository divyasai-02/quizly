services:
  postgres:
    image: postgres:16-alpine
    container_name: quizly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizly
      POSTGRES_USER: quizly
      POSTGRES_PASSWORD: quizly_password
    ports:
      - "5433:5432"
    volumes:
      - quizly_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizly -d quizly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quizly_postgres_data:
